<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>This is a simple greeting builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <h1 class="display-1 text-center">Greeting Builder</h1>
        <p class="lead text-center">Create personalized greetings with ease!</p>
    </div>
    <div class="container mb-3">
        <form id="greetingFrom" action="#" method="post">
            <label for="firstname" class="form-label bold fw-bold">First Name</label>
            <input type="text" id="firstname" class="form-control" value="Himanshu" required autocomplete="off">
            <label for="lastname" class="form-label bold fw-bold">Last Name</label>
            <input type="text" id="lastname" class="form-control" autocomplete="off">
            <label for="greeting" class="form-label bold fw-bold">Greeting Message</label>
            <input type="text" id="greeting" class="form-control" value="Welcome to Full Stack Course" autocomplete="off">
            
    
       
        </div>
        <div class="container text-center ">
        <button class="btn btn-primary" type="submit">Create Greeting</button>
        <button class="btn btn-success" type="reset">Reset</button>
        </div>
    </form>




    <script>
        let form = document.getElementById("greetingFrom");
        console.log(form);


        function createGreeting(event) {
            event.preventDefault();
            let firstName = document.getElementById("firstname").value;
            let lastName = document.getElementById("lastname").value;
            let greetingMessage = document.getElementById("greeting").value;

            let greeting = `${greetingMessage} ${firstName} ${lastName}!`;
            alert(greeting);
        }
        function createGreeting(event) {
            event.preventDefault();
            let firstName = document.getElementById("firstname").value;
            let lastName = document.getElementById("lastname").value;
            let greetingMessage = document.getElementById("greeting").value;

            let greeting = `${greetingMessage}, ${firstName} ${lastName}!`;
            alert(greeting);
        }

        form.addEventListener("reset", function (event){
            event.preventDefault();
            document.getElementById("firstname").value = "";
            document.getElementById("lastname").value ="";
            


        });
        form.addEventListener("submit", createGreeting);

        

        const firstNameInput = document.getElementById("firstname");
        const lastNameInput = document.getElementById("lastname");
        const greetingInput = document.getElementById("greeting");

        firstNameInput.addEventListener("click", function () {
            if (firstNameInput.value === "Himanshu") {
                firstNameInput.value = "";
            }
           
        });
        lastNameInput.addEventListener("click", function () {
            lastNameInput.value = "";
        });
        // greetingInput.addEventListener("click", function () {

        //         greetingInput.value = "";
        //     }
        // });

    </script>
</body>
</html>
