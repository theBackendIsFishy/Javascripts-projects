<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Palindrome</title>
</head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<body>
    <div class="container">
         <h1 class="display-2 text-center mt-2">Check Palindrome</h1>
         <form action="" id="form" class="mt-3">
            <label for="string " class="form-label fw-bold">Enter a string to check Palindrome</label>
            <input type="text" name="string" id="string" class="form-control" required autocomplete="off" placeholder="Enter a string to check Palindrome"s>
            <div class="container text-center mt-3">
                <button class="btn btn-primary" type="submit">Check</button>
                <button class="btn btn-success" type="reset">Reset</button>
            </div>
         </form>
    </div>
    <div class="container text-center mt-3">
        <h1 id="result">

        </h1>
    </div>

    
   
    
    <script>

        const form = document.getElementById("form");
        form.addEventListener("submit", function(event){
            event.preventDefault();
            // const string = document.getElementById("string").value;
            // console.log(string.split(" ").join(""));
            let string = document.getElementById("string").value.trim().split(" ").join(" ").toLowerCase();
            j = string.length -1;

            for (let i=0; i<string.length/2; i++, j--){ 
               
                if (string[i] !== string[j]){
                    document.getElementById("result").innerHTML = `"${string}" `+ "is not a palindrome";
                    alert(`"${string}" `+ "The string is not a palindrome");
                    return;
                }
                
                   
                
                }
             document.getElementById("result").innerHTML = `"${string}" `+ "is a palindrome";
                    alert(`"${string}" `+ "The string is a palindrome");
                    return;

        })

            const stringInput = document.getElementById("string");
            stringInput.addEventListener("focus", function() {
                              
                document.getElementById("result").innerHTML = "";
                document.getElementById("string").placeholder = "";
            });
             stringInput.addEventListener("blur", function() {
                if (stringInput.value.trim().split(" ").join(" ").toLowerCase()=== "") {
                    document.getElementById("string").placeholder = "Enter a string to check Palindrome";
                }
                
            });

            

           
    </script>

</body>
</html>
